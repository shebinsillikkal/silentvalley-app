name: silentvalley
description: Silent Valley National Park — Visitor & Trekking Companion App
version: 1.2.0+12

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  flutter_map: ^6.1.0         # offline maps
  mbtiles: ^0.3.0              # offline map tiles
  audioplayers: ^5.2.1         # wildlife call audio
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  razorpay_flutter: ^1.3.6
  flutter_local_notifications: ^16.2.0
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  provider: ^6.1.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/wildlife/
    - assets/maps/
    - assets/audio/
